<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>88FRP 控制台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 左侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <button class="btn-create" id="btnShowCreate">
          <span>+</span> 创建实例
        </button>
      </div>
      <div class="instance-list" id="instanceList">
        <!-- 实例列表项 -->
      </div>
    </aside>

    <!-- 右侧主面板 -->
    <main class="main-content">
      <!-- 空状态 -->
      <div id="emptyState" class="empty-state">
        <p>请选择或创建一个实例开始管理</p>
      </div>

      <!-- 实例详情工作台 -->
      <div id="workbench" style="display: none; flex: 1; flex-direction: column;">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
          <div class="toolbar-left">
            <button class="btn btn-primary" id="btnStart">启动</button>
            <button class="btn btn-secondary" id="btnStop">暂停</button>
            <div id="instStatusInfo" class="inst-status-info">
              <!-- 动态注入 PID 和 运行时间 -->
            </div>
          </div>
          <div class="toolbar-right">
            <input type="text" class="input-secret" id="inputSecret" placeholder="输入密匙 (secret)">
            <button class="btn btn-primary" id="btnSync">同步配置</button>
          </div>
        </header>

        <!-- 视图切换标签 -->
        <nav class="view-tabs">
          <div class="tab active" data-view="editor">配置文件</div>
          <div class="tab" data-view="log">运行日志</div>
        </nav>

        <!-- 内容区域 -->
        <div class="content-area">
          <!-- 编辑器视图 -->
          <div id="editorView" class="editor-container active">
            <textarea id="configEditor" class="editor" placeholder="在此粘贴 frpc 配置..."></textarea>
            <div style="padding: 12px 24px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 12px;">
              <button class="btn btn-danger" id="btnDelete">删除实例</button>
              <button class="btn btn-primary" id="btnSaveConfig">保存配置</button>
            </div>
          </div>

          <!-- 日志视图 -->
          <div id="logView" class="log-container">
            <div id="logContent" class="log-view">正在加载日志...</div>
            <div style="padding: 12px 24px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end;">
              <button class="btn btn-secondary" id="btnRefreshLog">刷新日志</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 创建实例弹窗 -->
  <div id="createModal" class="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">创建新实例</h3>
      <div class="form-group">
        <label>实例名称</label>
        <input type="text" id="newInstName" class="form-control" placeholder="例如：主力隧道">
      </div>
      <div class="form-group">
        <label>密匙 (可选)</label>
        <input type="text" id="newInstSecret" class="form-control" placeholder="留空则手动配置">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="btnCancelCreate">取消</button>
        <button class="btn btn-primary" id="btnConfirmCreate">创建</button>
      </div>
    </div>
  </div>

  <!-- 全局提示 -->
  <div id="toast" class="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
